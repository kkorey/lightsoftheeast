<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Lights of the East Lodge No. 33</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--color-bg) 0%, var(--color-bg-light) 100%);
            margin: 0;
            padding: 2rem;
            text-align: center;
        }

        .thanks-container {
            max-width: 600px;
            padding: 4rem 3rem;
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            font-size: 5rem;
            color: var(--color-primary);
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.1rem;
            color: var(--color-text);
            line-height: 1.6;
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="thanks-container">
        <div class="success-icon">
            <i class="fas fa-paper-plane"></i>
        </div>
        <h1>Message Received</h1>
        <p>Thank you for reaching out to Lights of the East Lodge No. 33. Your message has been sent successfully, and a
            brother will get back to you shortly.</p>
        <a href="index.html" class="btn-primary">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>
</body>

</html>
