<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Lights of the East</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--color-bg) 0%, var(--color-bg-light) 100%);
            padding: 2rem;
        }

        .portal-container {
            width: 100%;
            max-width: 600px;
            padding: 3rem;
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .portal-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .portal-header h2 {
            color: var(--color-primary);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cart-item-info {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .cart-item-image {
            width: 60px;
            height: 60px;
            background-color: var(--color-bg-light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
            font-size: 1.5rem;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .cart-item-details h4 {
            color: var(--color-text);
            margin-bottom: 0.25rem;
            font-family: var(--font-body);
        }

        .cart-item-details p {
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }

        .cart-item-price {
            text-align: right;
            font-weight: 600;
            color: var(--color-text);
        }

        .cart-item-price p {
            margin-bottom: 0.25rem;
        }
        
        .cart-item-price span {
            color: var(--color-text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .cart-item-price span:hover {
            color: #ff4d4d;
        }

        .cart-summary {
            margin-top: 2rem;
            padding-top: 1rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--color-text-muted);
        }

        .summary-row.total {
            color: var(--color-primary);
            font-size: 1.2rem;
            font-weight: 600;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding-top: 1rem;
            margin-bottom: 2rem;
            font-family: var(--font-heading);
            text-transform: uppercase;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-heading);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--color-primary);
        }

        @media (max-width: 500px) {
            .portal-container {
                padding: 2rem;
            }
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .cart-item-price {
                text-align: left;
                display: flex;
                width: 100%;
                justify-content: space-between;
                align-items: center;
            }
        }
    </style>
</head>

<body>
    <a href="index.html#store" class="back-link"><i class="fas fa-arrow-left"></i> Continue Shopping</a>

    <div class="portal-container reveal active">
        <div class="portal-header">
            <h2>Your Cart</h2>
            <p style="color: var(--color-text-muted);">Items you've added will appear here.</p>
        </div>

        <div style="text-align: center; padding: 3rem 0;">
            <i class="fas fa-shopping-cart" style="font-size: 4rem; color: rgba(212, 175, 55, 0.2); margin-bottom: 1.5rem; display: block;"></i>
            <p style="color: var(--color-text-muted); font-size: 1.1rem; margin-bottom: 2rem;">Your cart is empty.</p>
            <a href="index.html#store" class="btn-primary">Browse the Store</a>
        </div>
    </div>
</body>

</html>
