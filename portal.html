<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Portal | Grand Lodge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--color-bg) 0%, var(--color-bg-light) 100%);
            padding: 2rem;
        }

        .portal-container {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .portal-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--color-primary);
            margin-bottom: 1.5rem;
            object-fit: cover;
        }

        .portal-header h2 {
            color: var(--color-primary);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .portal-header p {
            color: var(--color-text-muted);
            margin-bottom: 2.5rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            background-color: rgba(22, 27, 34, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .form-group input:focus {
            background-color: var(--color-bg-light);
        }

        .portal-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .portal-footer a {
            color: var(--color-text-muted);
        }

        .portal-footer a:hover {
            color: var(--color-primary);
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-heading);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--color-primary);
        }

        @media (max-width: 500px) {
            .portal-container {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <div class="portal-container reveal active">
        <img src="icon.png" alt="Lodge Logo" class="portal-logo">
        <div class="portal-header">
            <h2>Member Portal</h2>
            <p>Enter your credentials to access the lodge directory and resources.</p>
        </div>

        <form action="#" method="get"
            onsubmit="event.preventDefault(); alert('This is a mockup. Login functionality would connect to your backend database.');">
            <div class="form-group">
                <label for="member-id"><i class="fas fa-id-card"></i> Member ID or Email</label>
                <input type="text" id="member-id" placeholder="Enter your ID or Email" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-key"></i> Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary w-100">Secure Login</button>
        </form>

        <div class="portal-footer">
            <a href="#">Forgot Password?</a>
            <a href="#">Request Access</a>
        </div>
    </div>
</body>

</html>
